name: Android CI

on:
  push:
    branches:
      - main
      - feature/page-styles

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Получение исходников
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Сборка debug APK
        run: ./gradlew assembleDebug

      - name: Подготовка APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Browser-debug.apk

      - name: Загрузка APK в артефакты
        uses: actions/upload-artifact@v4
        with:
          name: Browser-debug
          path: Browser-debug.apk

      - name: Обновление постоянного Release
        if: github.ref == 'refs/heads/feature/page-styles'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Browser development build
          prerelease: true
          make_latest: false
          files: Browser-debug.apk
